# Rys — local development stack
# Services: postgres (db), backend (Express API), frontend (Vite dev server)
#
# Usage:
#   docker compose up --build
#   docker compose exec backend npm run migrate     # run DB migrations
#   docker compose exec backend npm run seed         # seed sample data
#
# The backend waits for postgres to be healthy before starting.

services:
  db:
    image: postgres:16-alpine
    container_name: rys_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rys_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-rys}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rys_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rys} -d ${POSTGRES_DB:-rys}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rys_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-rys}:${POSTGRES_PASSWORD:-rys_dev_password}@db:5432/${POSTGRES_DB:-rys}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # AI providers — all optional; blank on all = mock mode.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - rys_uploads:/app/uploads
    command: sh -c "npm run migrate && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rys_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api/v1}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  rys_pgdata:
  rys_uploads:
